services:
  ctfd:
    image: ctfd-ctfd:latest
    restart: always
    ports:
      - "8000:8000"
    group_add:
      - "988"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd@db/ctfd
      - REDIS_URL=redis://cache:6379
      - WORKERS=3
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USE_TLS=true
      - MAIL_USERNAME=adlinaauji@raudah.usim.edu.my
      - MAIL_PASSWORD=yobckhfknxlxcgbx
      - MAIL_FROM_ADDR=adlinaauji@raudah.usim.edu.my
      - DOCKER_HOST=tcp://159.89.235.61:2375
      - DOCKER_API_VERSION=1.44
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      permissions:
        condition: service_completed_successfully
      db:
        condition: service_started
      cache:
        condition: service_started
    networks:
      default:
      internal:

  permissions:
    image: alpine:3.23
    user: root
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
    command: chown -R 1001:1001 /var/uploads /var/log/CTFd

  nginx:
    image: nginx:stable
    restart: always
    volumes:
      - ./conf/nginx/http.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    depends_on:
      - ctfd

  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=ctfd
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=ctfd
      - MARIADB_DATABASE=ctfd
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - .data/mysql:/var/lib/mysql
    networks:
      internal:
    command: [mysqld, --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --wait_timeout=28800, --log-warnings=0]

  cache:
    image: redis:4
    restart: always
    volumes:
      - .data/redis:/data
    networks:
      internal:

  frps:
    image: snowdreamtech/frps
    restart: always
    volumes:
      - ./frp/frps.ini:/etc/frp/frps.ini
    command: ["/usr/bin/frps", "-c", "/etc/frp/frps.ini"]
    ports:
      - "8081:8081"
      - "7000:7000"
      - "7500:7500"
    networks:
      default:

  frpc:
    image: snowdreamtech/frpc
    restart: always
    volumes:
      - ./frp/frpc.ini:/etc/frp/frpc.ini
    command: ["/usr/bin/frpc", "-c", "/etc/frp/frpc.ini"]
    depends_on:
      - frps
    ports:
      - "7400:7400"
    networks:
      default:
      frp-containers:

networks:
  default:
  internal:
    internal: true
  frp-containers:
    external: true
    name: ctfd_frp-containers
